<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Site Blocked</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/blocked.css" />
  </head>
  <body>
    <main class="blocked-shell">
      <section class="blocked-card">
        <p class="blocked-kicker">SiteBlocker active</p>
        <h1>Access blocked</h1>
        <p class="blocked-copy">
          This request matched one of your blocking rules.
        </p>

        <div class="blocked-detail">
          <span class="detail-label">Blocked destination</span>
          <code id="blockedUrl" class="detail-value"></code>
        </div>

        <div class="blocked-detail">
          <span class="detail-label">Applied rule</span>
          <p id="ruleSummary" class="detail-value">
            This page was blocked by your current SiteBlocker rule.
          </p>
          <p id="ruleSchedule" class="detail-note"></p>
        </div>

        <div class="blocked-actions">
          <a href="#" id="openOptions" class="primary-link">Review rules</a>
          <button type="button" id="goBackButton" class="secondary-link">
            Go back
          </button>
        </div>
      </section>
    </main>

    <script src="../js/rule-engine.js"></script>
    <script src="../js/blocked.js"></script>
  </body>
</html>
